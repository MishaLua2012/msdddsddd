name: Generate MSDF Atlas

on:
  workflow_dispatch:
    inputs:
      font_file:
        description: 'Путь к шрифту в репозитории (например fonts/MyFont.ttf)'
        required: true
        default: 'fonts/MyFont.ttf'
      font_size:
        description: 'Размер шрифта (px)'
        required: false
        default: '32'
      atlas_name:
        description: 'Имя выходных файлов (без расширения)'
        required: false
        default: 'atlas'
  push:
    paths:
      - 'fonts/**'
      - 'charset.txt'
      - '.github/workflows/msdf.yml'

jobs:
  build-atlas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git \
            libfreetype6-dev libpng-dev zlib1g-dev

      - name: Cache msdf-atlas-gen build
        id: cache-msdf
        uses: actions/cache@v4
        with:
          path: msdf-atlas-gen/build
          key: msdf-atlas-gen-${{ runner.os }}-v1

      - name: Clone msdf-atlas-gen source
        run: |
          if [ ! -d "msdf-atlas-gen/.git" ]; then
            git clone --recursive https://github.com/Chlumsky/msdf-atlas-gen.git
          fi

      - name: Build msdf-atlas-gen (no vcpkg)
        run: |
          cd msdf-atlas-gen
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMSDF_ATLAS_USE_VCPKG=OFF \
            -DMSDF_ATLAS_USE_SKIA=OFF \
            -DMSDF_ATLAS_BUILD_STANDALONE=ON
          cmake --build build --target msdf-atlas-gen-standalone --config Release -- -j$(nproc)

      - name: Locate built binary
        id: locate
        run: |
          BIN=$(find msdf-atlas-gen/build -type f -name "msdf-atlas-gen*" -executable | head -n1)
          if [ -z "$BIN" ]; then
            echo "Бинарник не найден после сборки! Полный список файлов в build/bin и build/:"
            find msdf-atlas-gen/build -maxdepth 5
            exit 1
          fi
          chmod +x "$BIN"
          echo "Найден бинарник: $BIN"
          echo "bin_path=$BIN" >> "$GITHUB_OUTPUT"
          "$BIN" -version || true

      - name: Prepare charset
        run: |
          if [ ! -f charset.txt ]; then
            echo "charset.txt не найден, создаю базовый ASCII"
            printf ' !"#$%%&'"'"'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~' > charset.txt
          fi
          echo "Charset превью:"
          head -c 200 charset.txt

      - name: Debug help
        run: |
          BIN="${{ steps.locate.outputs.bin_path }}"
          "$BIN" --help 2>&1 | sed -n "1,80p"
      - name: Generate atlas
        run: |
          mkdir -p atlas
          FONT="${{ github.event.inputs.font_file || 'fonts/MyFont.ttf' }}"
          SIZE="${{ github.event.inputs.font_size || '32' }}"
          NAME="${{ github.event.inputs.atlas_name || 'atlas' }}"
          BIN="${{ steps.locate.outputs.bin_path }}"

          if [ ! -f "$FONT" ]; then
            echo "ОШИБКА: файл шрифта '$FONT' не найден в репозитории."
            echo "Положи .ttf/.otf в папку fonts/ и запусти снова."
            exit 1
          fi

          "$BIN" \
            -font "$FONT" \
            -type msdf \
            -size "$SIZE" \
            -glyphset charset.txt \
            -imageout "atlas/${NAME}.png" \
            -json "atlas/${NAME}.json" \
            -pots \
            -pxrange 4

      - name: Show result info
        run: |
          ls -la atlas/
          echo "---"
          echo "Готово: atlas/*.png и atlas/*.json"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: msdf-atlas
          path: atlas/

      - name: Commit result back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atlas/
          git diff --cached --quiet && echo "Нечего коммитить" || (git commit -m "Auto-generate MSDF atlas [skip ci]" && git push)
